<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>personalGit</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        background: #0b0b10;
        color: #e7e7ec;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        -webkit-app-region: drag;
        user-select: none;
      }
      .logo {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .status {
        font-size: 12px;
        opacity: 0.7;
      }
      .ring {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: rgba(255, 255, 255, 0.85);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="ring"></div>
      <div class="logo">personalGit</div>
      <div class="status" id="status">Starting…</div>
    </div>
  </body>
</html>
